<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Template Admin</title>

    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
</head>

<body>

<!-- HEADER FRAGMENT -->
<th:block th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">

            <a class="navbar-brand" th:href="@{/administrador}">
                Spring eCommerce
            </a>

            <form class="form-inline my-2 my-lg-0" method="post" action="#">
                <input class="form-control mr-sm-2"
                       type="search"
                       placeholder="Buscar"
                       name="nombre"
                       autocomplete="off">

                <button class="btn btn-outline-success" type="submit">
                    Buscar
                </button>
            </form>

            <button class="navbar-toggler" type="button"
                    data-toggle="collapse"
                    data-target="#navbarResponsive">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarResponsive">

                <ul class="navbar-nav ml-auto">

                    <li class="nav-item dropdown">

                        <a class="nav-link dropdown-toggle"
                           href="#"
                           id="navbarDropdownMenuLink"
                           data-toggle="dropdown">
                            ADMIN
                        </a>

                        <div class="dropdown-menu">
                            <a class="dropdown-item" th:href="@{/administrador/productos}">Productos</a>
                            <a class="dropdown-item" th:href="@{/administrador/usuarios}">Usuarios</a>
                            <a class="dropdown-item" th:href="@{/cerrar}">Salir</a>
                        </div>

                    </li>

                </ul>

            </div>

        </div>
    </nav>
</th:block>

<!-- FOOTER FRAGMENT -->
<th:block th:fragment="footer">
    <footer class="py-5 bg-dark">
        <div class="container">
            <p class="m-0 text-center text-white">
                Copyright &copy; Spring eCommerce 2026
            </p>
        </div>
    </footer>
</th:block>

</body>
</html>
